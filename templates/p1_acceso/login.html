<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwiftShip — Iniciar Sesión</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
  <div class="auth-wrapper">

    <div class="auth-brand">
      <div class="brand-logo">⚡</div>
      <h1>SwiftShip</h1>
      <p>Plataforma de Inteligencia Logística</p>
    </div>

    <div class="auth-card">
      <h2>Iniciar Sesión</h2>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('login.login') }}">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email"
                 placeholder="usuario@swiftship.com" required autofocus>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password"
                 placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-primary">Ingresar</button>
      </form>
    </div>

    <p class="auth-footer">SwiftShip © 2025 — Sistema Logístico Global</p>
  </div>
</body>
</html>

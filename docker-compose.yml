version: "3.9"

services:
  # 1. POCKETBASE
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: swiftship_pocketbase
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - pocketbase_data:/pb/pb_data
    networks:
      - swiftship_net

  # 2. MONGODB
  mongodb:
    image: mongo:7.0
    container_name: swiftship_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
      MONGO_INITDB_DATABASE: swiftship
    volumes:
      - mongodb_data:/data/db
    networks:
      - swiftship_net

  # 3. MONGO EXPRESS (interfaz visual de MongoDB)
  mongo-express:
    image: mongo-express:1.0.2
    container_name: swiftship_mongoexpress
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      - mongodb
    networks:
      - swiftship_net

  # 4. FLASK APP (se activa después)
  # flask_app:
  #   build: .
  #   container_name: swiftship_app
  #   restart: unless-stopped
  #   ports:
  #     - "5000:5000"
  #   environment:
  #     FLASK_ENV: development
  #     MONGO_URI: mongodb://admin:admin@mongodb:27017/swiftship?authSource=admin
  #     MONGO_DB: swiftship
  #     POCKETBASE_URL: http://pocketbase:8090
  #   depends_on:
  #     - mongodb
  #     - pocketbase
  #   networks:
  #     - swiftship_net

volumes:
  pocketbase_data:
  mongodb_data:

networks:
  swiftship_net:
    driver: bridge
